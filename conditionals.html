<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Check whether a number is positive or negative.
        let num = 10;
        if (num > 0) {
            console.log("Positive Number");
        } else if (num < 0) {
            console.log("Negative Number");
        } else {
            console.log("Zero");
        }

        // 2. Check whether a number is even or odd.
        console.log(num % 2 == 0 ? "Even number" : "Odd number");

        // 3. Check whether a person is eligible to vote.
        let voterAge = 22;
        console.log(voterAge >= 18 ? "Person is eligible to vote" : "Person is not eligible to vote");

        // 4. Find the largest among two numbers.
        let a = 20;
        let b = 15;
        console.log(a > b ? "A is largest" : "B is largest");

        // 5. Find the largest among three numbers.
        let c = 50;
        if (a > b && a > c) {
            console.log("A is greater");
        }
        else if (b > a && b > c) {
            console.log("B is greater");
        } else {
            console.log("C is greater");
        }

        // 6. Check whether a year is a leap year.
        let year = 2026;
        if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
            console.log("It's a leap year");
        } else {
            console.log("It's not a leap year");
        }

        // 7. Check whether a number is divisible by both 3 and 5.
        let number = 15;
        console.log(number % 3 === 0 && number % 5 === 0 ? "Number is divisible by both 3 and 5" : "Number is not divisible by 3 and 5");

        // 8. Create a simple grading system:
        // - 90 + → A
        // - 75 + → B
        // - 50 + → C
        // - below 50 → Fail
        let marks = 100;
        if (marks >= 90 && marks <= 100) {
            console.log("A Grade");
        } else if (marks >= 75) {
            console.log("B Grade");
        } else if (marks >= 50) {
            console.log("C Grade");
        } else {
            console.log("Fail");
        }

        // 1. Check whether a character is a vowel or consonant.
        let str = "a"
        let char = str.toLowerCase();

        if (char === "a" ||
            char === "e" ||
            char === "i" ||
            char === "o" ||
            char === "u") {
            console.log("Character is a vowel");
        } else {
            console.log("Character is a consonant");
        }

        // 2. Create a calculator using `switch` statement.
        let oprator = "+";
        function calculator(a, b, oprator) {

            switch (oprator) {
                case "+": return a + b;
                case "-": return a - b;
                case "*": return a * b;
                case "/": return a / b;
                case "%": return a % b;
                default: return "NaN";
            }
        }
        console.log(calculator(1, 2, "+"));
        console.log(calculator(10, 5, "-"));
        console.log(calculator(10, 5, "*"));
        console.log(calculator(10, 2, "/"));
        console.log(calculator(10, 2, "%"));
        console.log(calculator(1));

        // 3. Print the day name based on a number(1–7).
        let day = 1;
        switch (day) {
            case 1: console.log("Monday");
                break;
            case 2: console.log("Tuesday");
                break;
            case 3: console.log("Wednesday");
                break;
            case 4: console.log("Thursday");
                break;
            case 5: console.log("Friday");
                break;
            case 6: console.log("Saturday");
                break;
            case 7: console.log("Sunday");
                break;

        }

        // 4. Check whether a username is `"admin"` and password is`"1234"`.
        let userName = "admin";
        let userPass = "1234";
        if (userName === "admin" && userPass === "1234") {
            console.log("Ye sahi banda hai isako login karava do");
        } else {
            console.log("Ye hacker/forgotPass vala banda hai isako forgot pass ka option do");
        }
    </script>
</body>

</html>
