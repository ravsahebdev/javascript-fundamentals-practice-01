<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //  1. Create variables of type string, number, boolean, null, and undefined.
        let st = "Ravsaheb";
        let num = 8;
        let boolean = true;
        let nul = null;
        let un = undefined;

        // 2. Check the type of different variables using `typeof`.
        console.log(typeof (st), typeof (num), typeof (boolean), typeof (nul), typeof (un));

        // 3. Store your mobile number in a variable and check its type.
        let moNum = 9370440280;
        console.log(typeof (moNum));

        // 4. Create a variable with value `null` and check its type.
        let n = null;
        console.log(typeof (n)); // Object

        // 5. Create a bigint number and print it.
        let bigInt = 999999999999999999n; // BigInt me number ke last me n lagana padata hai
        console.log(bigInt);
        console.log(typeof(bigInt));

    </script>
</body>

</html>
