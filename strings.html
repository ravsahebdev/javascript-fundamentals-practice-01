<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Create a string and print its length.
        let str = "JavaScript";
        console.log(str.length);

        // 2. Convert a string into uppercase.
        console.log(str.toUpperCase());

        // 3. Convert a string into lowercase.
        console.log(str.toLowerCase());

        // 4. Check if a string includes the word `"JavaScript"`.
        let word = "I Love JavaScript";
        console.log(word.includes("JavaScript"));

        // 5. Extract the word `"World"` from `"Hello World"`.
        let extract = "Hello World";
        console.log(extract.slice(-5));

        // 6. Replace `"apple"` with `"mango"` in a sentence.
        let fruit = "apple";
        console.log(fruit.replace("apple", "mango"));

        // 7. Split `"HTML,CSS,JS"` into an array.
        let lang = "HTML, CSS, JS";
        console.log(lang.split(","));

        // 8. Remove extra spaces from a string.
        let spaces = "         removed";
        console.log(spaces.trim());

        // 9. Repeat the word `"Hi"` 5 times.
        let grit = "Hi";
        console.log(grit.repeat(5));

        // 10. Print the first character of a string.
        let char = "character";
        console.log(char.charAt(0));

        // 11. Use template literals to print:`"My name is Raju and I am 20 years old"`
        let name = "Raju";
        let age = 20;
        console.log(`My name is ${name} and I am ${age} years old`);
        
    </script>
</body>

</html>
