<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Check whether a number is even or odd using ternary operator.
        let num = 10;
        let check = num % 2 === 0 ? "even" : "odd";
        console.log(check);

        // 2. Check whether age is above 18 using ternary operator.
        let age = 21;
        let checkAge = age >= 18 ? "above" : "below";
        console.log(checkAge);

        // 3. Find the greater number between two values using ternary operator.
        let a = 10;
        let b = 20;
        let greater = a > b ? "a is greater" : "b is greater";
        console.log(greater);
    </script>
</body>

</html>
