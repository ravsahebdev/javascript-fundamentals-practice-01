<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Check whether an empty string is truthy or falsy.
        let check = "" ? "true" : "false";
        console.log(check);

        // 2. Check whether `0` is truthy or falsy.
        let test = 0 ? "true" : "false";
        console.log(test);

        // 3. Check whether `[]` is truthy or falsy.
        let arr = [] ? "true" : "false";
        console.log(arr);

        // 4. Create a variable and print `"Valid"` if it has a value otherwise print `"Invalid"`.
        let value;
        let print = value ? "Valid" : "Invalid";
        console.log(print);

    </script>
</body>

</html>
