    <script>

        // 3. Create two variables and swap their values.
        let a, b, c;
        a = 10;
        b = 20;
        c = a; // 10
        a = b; // 20
        b = c; // 10
        console.log(a, b); // 20 10

        b = a - b; // 30 - 20 = 10
        a = a - b; // 30 - 10 = 20
